<article>
    <h2>Form Pemesanan Kendaraan</h2>

    <form action="" method="post">
        <fieldset>
            <legend>Formulir Pemesanan Kendaraan</legend>

            <label for="nama">Nama Pemesan:</label>
            <input type="text" id="nama" name="nama" required>
            <br>

            <label for="alamat">Alamat Pengiriman:</label>
            <input type="text" id="alamat" name="alamat" required>
            <br>

            <label for="telepon">Nomor Telepon:</label>
            <input type="tel" id="telepon" name="telepon"
                   pattern="[0-9]{10,13}"
                   title="Masukkan 10-13 digit angka" required>
            <br>

            <label for="tanggal_sewa">Tanggal Sewa:</label>
            <input type="date" id="tanggal_sewa" name="tanggal_sewa" required>
            <br>

            <label for="tanggal_kembali">Tanggal Pengembalian:</label>
            <input type="date" id="tanggal_kembali" name="tanggal_kembali" required>
            <br>

            <label for="jenis">Jenis Kendaraan:</label>
            <select id="jenis" name="jenis">
                <option value="mobil">Mobil</option>
                <option value="motor">Motor</option>
            </select>
            <br>

            <label for="model">Model Kendaraan:</label>
            <input type="text" id="model" name="model" placeholder="Contoh: Avanza/Beat">
            <br>

            <label for="plat">Nomor Plat Kendaraan (opsional):</label>
            <input type="text" id="plat" name="plat">
            <br>

           <label for="asuransi">Asuransi Tambahan:</label>
           <select id="asuransi" name="asuransi">
           <option value="ya">Ya</option>
           <option value="tidak">Tidak</option>
           </select>
           <br>
           <br>

            <label for="catatan">Catatan Khusus:</label>
            <textarea id="catatan" name="catatan"></textarea>
            <br><br>

            <button type="submit">Kirim</button>

        </fieldset>
    </form>

</article>
